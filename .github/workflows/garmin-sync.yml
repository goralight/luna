name: Sync Garmin Dives

on:
  schedule:
    # Runs every day at 03:00 UTC
    - cron: '0 3 * * 1,5'
  workflow_dispatch: {} # allow manual runs

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install garth garminconnect requests

      # Restore the garth session written by the previous run.
      # Falls back to the GARMIN_TOKENS secret on the first run or after cache eviction.
      # The key changes each run so the cache is always updated; restore-keys matches
      # the most recent entry by prefix.
      - name: Restore Garmin session cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/garmin_session
          key: garmin-session-${{ github.run_id }}
          restore-keys: |
            garmin-session-

      - name: Run Garmin dive sync
        env:
          GARMINTOKENS: ${{ secrets.GARMIN_TOKENS }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_SESSION_FILE: /tmp/garmin_session
          PAYLOAD_URL: ${{ secrets.PAYLOAD_URL }}
          PAYLOAD_USER_EMAIL: ${{ secrets.PAYLOAD_USER_EMAIL }}
          PAYLOAD_USER_PASSWORD: ${{ secrets.PAYLOAD_USER_PASSWORD }}
        run: |
          python scripts/sync_garmin_dives.py

      # Save the refreshed session so the next run can skip SSO/OAuth2 exchange.
      - name: Save Garmin session cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: /tmp/garmin_session
          key: garmin-session-${{ github.run_id }}
