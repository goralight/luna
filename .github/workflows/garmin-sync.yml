name: Sync Garmin Dives

on:
  schedule:
    # Runs every day at 03:00 UTC
    - cron: '0 3 * * 1,5'
  workflow_dispatch: {} # allow manual runs

jobs:
  sync:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # garmin-connect OAuth files (oauth1_token.json + oauth2_token.json). Not the same format as
      # Python GARMINTOKENS / Garth. Create once locally: log in with sync-garmin-dives-fit.js and
      # GARMIN_TOKEN_DIR=./garmin-oauth node scripts/sync-garmin-dives-fit.js, then commit the
      # folder to a private artifact or populate the cache from a backup.
      - name: Restore Garmin Connect token cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/garmin_connect_oauth
          key: garmin-node-oauth-${{ github.run_id }}
          restore-keys: |
            garmin-node-oauth-

      - name: Run Garmin dive sync (Node + FIT)
        env:
          GARMIN_TOKEN_DIR: /tmp/garmin_connect_oauth
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          PAYLOAD_URL: ${{ secrets.PAYLOAD_URL }}
          PAYLOAD_USER_EMAIL: ${{ secrets.PAYLOAD_USER_EMAIL }}
          PAYLOAD_USER_PASSWORD: ${{ secrets.PAYLOAD_USER_PASSWORD }}
        run: node scripts/sync-garmin-dives-fit.js

      - name: Save Garmin Connect token cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: /tmp/garmin_connect_oauth
          key: garmin-node-oauth-${{ github.run_id }}
